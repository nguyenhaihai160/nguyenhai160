<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>KING PHOTOBOOTH</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
color:white;
text-align:center;
}

#topbar{
background:#111;
padding:15px;
font-size:32px;
font-weight:bold;
}

#cameraBox{
position:relative;
display:inline-block;
margin-top:20px;
}

video{
width:520px;
border-radius:15px;
border:6px solid white;
}

#framePreview{
position:absolute;
top:0;
left:0;
width:520px;
pointer-events:none;
}

#count{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
font-weight:bold;
color:#00ffd5;
}

#flash{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
transition:0.2s;
}

.controls{
margin-top:15px;
}

button{
padding:14px 28px;
font-size:20px;
border:none;
border-radius:12px;
margin:5px;
cursor:pointer;
background:#ff3d6e;
color:white;
}

select,input{
padding:8px;
margin:4px;
}

#result{
margin-top:20px;
background:white;
padding:15px;
display:inline-block;
border-radius:10px;
}

canvas{
background:white;
}

#themePanel{
margin-top:25px;
background:#111;
padding:20px;
border-radius:10px;
width:500px;
margin:auto;
}

</style>

</head>

<body>

<div id="topbar">👑 KING PHOTOBOOTH</div>

<div id="cameraBox">

<video id="video" autoplay playsinline></video>

<img id="framePreview">

<div id="count"></div>

<div id="flash"></div>

</div>

<div class="controls">

<select id="frameSelect" onchange="changeFrame()">
<option value="">Không frame</option>
</select>

📂 Frame PNG
<input type="file" accept="image/png" onchange="loadCustomFrame(event)">

<br>

🧩 Sticker
<input type="file" accept="image/png" onchange="addSticker(event)">

<select id="filter" onchange="updateFilter()">
<option value="none">Không filter</option>
<option value="grayscale(1)">Đen trắng</option>
<option value="sepia(1)">Vintage</option>
<option value="contrast(150%)">Tương phản</option>
<option value="brightness(120%)">Sáng</option>
</select>

<br>

<button onclick="startShoot()">📸 BẮT ĐẦU CHỤP</button>
<button onclick="enterFullscreen()">🖥 KIOSK</button>

</div>

<div id="result">
<canvas id="canvas"></canvas>
</div>

<br>

<button onclick="download()">💾 TẢI ẢNH</button>

<div id="qr"></div>

<div id="themePanel">

<h3>🎨 CHỈNH GIAO DIỆN</h3>

Màu tiêu đề
<input type="color" onchange="changeTitleColor(this.value)">

<br>

Màu nút
<input type="color" onchange="changeButtonColor(this.value)">

<br>

Ảnh nền
<input type="file" accept="image/*" onchange="changeBackground(event)">

<br>

Font chữ

<select onchange="changeFont(this.value)">
<option value="Arial">Arial</option>
<option value="Verdana">Verdana</option>
<option value="Tahoma">Tahoma</option>
<option value="Courier New">Courier</option>
<option value="Times New Roman">Times</option>
</select>

</div>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const count=document.getElementById("count")
const flash=document.getElementById("flash")
const framePreview=document.getElementById("framePreview")

let photos=[]
let frameImage=null
let frameColor=null
let stickers=[]
let dragging=null

/* CAMERA */

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream
})

/* FILTER */

function updateFilter(){
video.style.filter=document.getElementById("filter").value
}

/* FRAME MÀU */

let frames=[
{name:"Frame Trắng",color:"#ffffff"},
{name:"Frame Hồng",color:"#ffc0cb"},
{name:"Frame Đen",color:"#000000"},
{name:"Frame Vàng",color:"#ffe066"},
{name:"Frame Xanh",color:"#00c2ff"},
{name:"Frame Tím",color:"#9b59b6"}
]

window.onload=function(){

let select=document.getElementById("frameSelect")

frames.forEach((f,i)=>{

let option=document.createElement("option")

option.value=i
option.text=f.name

select.appendChild(option)

})

}

/* CHỌN FRAME */

function changeFrame(){

let id=document.getElementById("frameSelect").value

if(id===""){
frameColor=null
frameImage=null
return
}

frameColor=frames[id].color
frameImage=null
framePreview.src=""

}

/* FRAME PNG */

function loadCustomFrame(e){

let file=e.target.files[0]
if(!file) return

let url=URL.createObjectURL(file)

framePreview.src=url

let img=new Image()

img.onload=function(){

frameImage=img
frameColor=null

}

img.src=url

}

/* STICKER */

function addSticker(e){

let file=e.target.files[0]
if(!file) return

let url=URL.createObjectURL(file)

let img=new Image()

img.onload=function(){

stickers.push({
img:img,
x:150,
y:150,
size:100
})

drawCanvas()

}

img.src=url

}

/* CHỤP ẢNH */

async function startShoot(){

photos=[]

for(let i=0;i<4;i++){

await countdown()

takePhoto()

await sleep(500)

}

drawCanvas()

createQR()

}

function takePhoto(){

flash.style.opacity=1

setTimeout(()=>flash.style.opacity=0,200)

let temp=document.createElement("canvas")

temp.width=400
temp.height=300

let t=temp.getContext("2d")

t.filter=document.getElementById("filter").value

t.drawImage(video,0,0,400,300)

photos.push(temp)

}

/* VẼ CANVAS */

function drawCanvas(){

let w=420
let h=photos.length*310+40

canvas.width=w
canvas.height=h

if(frameColor){
ctx.fillStyle=frameColor
}else{
ctx.fillStyle="white"
}

ctx.fillRect(0,0,w,h)

for(let i=0;i<photos.length;i++){
ctx.drawImage(photos[i],10,10+i*310,400,300)
}

if(frameImage){
ctx.drawImage(frameImage,0,0,w,h)
}

stickers.forEach(s=>{
ctx.drawImage(s.img,s.x,s.y,s.size,s.size)
})

}

/* KÉO STICKER */

canvas.addEventListener("mousedown",e=>{

let rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

stickers.forEach(s=>{
if(x>s.x && x<s.x+s.size && y>s.y && y<s.y+s.size){
dragging=s
}
})

})

canvas.addEventListener("mousemove",e=>{

if(!dragging) return

let rect=canvas.getBoundingClientRect()

dragging.x=e.clientX-rect.left-dragging.size/2
dragging.y=e.clientY-rect.top-dragging.size/2

drawCanvas()

})

canvas.addEventListener("mouseup",()=>{

dragging=null

})

/* COUNTDOWN */

function countdown(){

return new Promise(resolve=>{

let t=3

count.innerText=t

let timer=setInterval(()=>{

t--

if(t<=0){

clearInterval(timer)

count.innerText="📸"

setTimeout(()=>{
count.innerText=""
resolve()
},400)

}else{

count.innerText=t

}

},1000)

})

}

function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

/* DOWNLOAD */

function download(){

let link=document.createElement("a")

link.download="king-photobooth.png"

link.href=canvas.toDataURL()

link.click()

}

/* QR */

function createQR(){

document.getElementById("qr").innerHTML=""

new QRCode(document.getElementById("qr"),{
text:canvas.toDataURL(),
width:200,
height:200
})

}

/* FULLSCREEN */

function enterFullscreen(){
document.documentElement.requestFullscreen()
}

/* THEME */

function changeTitleColor(c){
document.getElementById("topbar").style.color=c
}

function changeButtonColor(c){
document.querySelectorAll("button").forEach(b=>{
b.style.background=c
})
}

function changeBackground(e){

let file=e.target.files[0]

let url=URL.createObjectURL(file)

document.body.style.backgroundImage="url("+url+")"
document.body.style.backgroundSize="cover"

}

function changeFont(f){
document.body.style.fontFamily=f
}

</script>

</body>
</html>
