<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>KING PHOTOBOOTH 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --neon-pink: #ff3d6e;
    --neon-cyan: #00ffea;
    --neon-orange: #ff8c42;
    --dark-bg: #0f0c29;
    --glass-bg: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    background-size: 300% 300%;
    animation: bgFlow 18s ease infinite;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    overflow-x: hidden;
  }
  @keyframes bgFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  #topbar {
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-orange), var(--neon-cyan));
    background-size: 200% 200%;
    animation: gradientFlow 10s ease infinite;
    padding: 20px 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 4px;
    text-shadow: 0 0 30px rgba(255,255,255,0.9), 0 0 60px var(--neon-pink);
    box-shadow: 0 10px 40px rgba(0,0,0,0.7);
  }
  @keyframes gradientFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── Khu vực camera + nút chụp ── */
  .camera-section {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 50px auto 30px;
    max-width: 780px;
    padding: 0 20px;
  }

  #cameraBox {
    position: relative;
    padding: 16px;
    background: var(--glass-bg);
    border-radius: 32px;
    box-shadow: 0 0 60px rgba(255,61,110,0.5),
                inset 0 0 30px rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
  }

  video {
    width: 600px;
    max-width: 92vw;
    border-radius: 24px;
    border: 10px solid rgba(255,255,255,0.2);
    box-shadow: 0 15px 50px rgba(0,0,0,0.6);
    transition: transform 0.3s;
  }
  video:hover { transform: scale(1.02); }

  #framePreview {
    position: absolute;
    inset: 16px;
    width: calc(100% - 32px);
    pointer-events: none;
    border-radius: 24px;
  }

  #count {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 220px;
    font-weight: 900;
    color: var(--neon-cyan);
    text-shadow: 0 0 80px var(--neon-cyan), 0 0 140px var(--neon-pink);
    pointer-events: none;
    animation: pulse 1s infinite alternate;
  }
  @keyframes pulse {
    from { transform: scale(0.9); opacity: 0.8; }
    to { transform: scale(1.1); opacity: 1; }
  }

  #flash {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.15s ease-out;
    pointer-events: none;
  }

  /* ── NÚT BẮT ĐẦU CHỤP - HÌNH TRÒN BÊN TRÁI ── */
  #startBtn {
    position: absolute;
    left: -160px;
    top: 50%;
    transform: translateY(-50%);
    width: 140px;
    height: 140px;
    border-radius: 50%;
    font-size: 1.05rem;
    font-weight: 700;
    color: white;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-orange));
    border: 5px solid rgba(255,255,255,0.25);
    box-shadow: 0 12px 40px rgba(255,61,110,0.7);
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
    text-align: center;
    line-height: 1.3;
  }

  #startBtn:hover {
    transform: translateY(-50%) scale(1.15);
    box-shadow: 0 25px 60px rgba(255,61,110,0.9);
    border-color: var(--neon-cyan);
  }

  #startBtn:active {
    transform: translateY(-50%) scale(0.96);
  }

  .controls {
    margin: 30px auto;
    max-width: 700px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
    padding: 0 20px;
  }

  button:not(#startBtn), select, input[type="file"], input[type="color"] {
    padding: 16px 32px;
    font-size: 1.1rem;
    font-weight: 600;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
  }

  button:not(#startBtn) {
    background: linear-gradient(45deg, var(--neon-pink), var(--neon-orange));
    color: white;
    position: relative;
    overflow: hidden;
  }

  button:not(#startBtn)::before {
    content: '';
    position: absolute;
    top: -100%; left: -100%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.4) 10%, transparent 60%);
    opacity: 0;
    transition: all 0.5s;
  }

  button:not(#startBtn):hover::before { opacity: 1; top: -50%; left: -50%; }

  button:not(#startBtn):hover {
    transform: translateY(-6px) scale(1.08);
    box-shadow: 0 16px 50px rgba(255,61,110,0.7);
  }

  select, input[type="color"], input[type="file"] {
    background: rgba(255,255,255,0.1);
    color: white;
    border: 2px solid rgba(0,255,234,0.3);
  }
  select option { background: #1a1a3a; color: white; }

  #result {
    margin: 50px auto 30px;
    background: var(--glass-bg);
    padding: 24px;
    border-radius: 32px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.6);
    backdrop-filter: blur(16px);
    max-width: 520px;
    border: 1px solid rgba(255,255,255,0.12);
  }

  canvas {
    border-radius: 20px;
    background: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    max-width: 100%;
  }

  #qr { margin: 40px auto; }

  #themePanel {
    margin: 50px auto;
    background: rgba(20,20,50,0.75);
    padding: 35px;
    border-radius: 32px;
    max-width: 620px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.6);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(0,255,234,0.15);
  }

  #themePanel h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.2rem;
    margin-bottom: 25px;
    text-shadow: 0 0 20px var(--neon-cyan);
  }

  input[type="color"] {
    width: 90px;
    height: 55px;
    border-radius: 16px;
    padding: 6px;
  }

  @media (max-width: 900px) {
    .camera-section { flex-direction: column; align-items: center; }
    #startBtn {
      position: static;
      transform: none;
      margin: 30px auto 20px;
      width: 120px;
      height: 120px;
      left: auto;
      top: auto;
    }
    video { width: 90vw; }
    #framePreview { width: 90vw; inset: 10px; }
  }

  @media (max-width: 500px) {
    #topbar { font-size: 2.2rem; padding: 16px; }
    #startBtn { width: 110px; height: 110px; font-size: 0.95rem; }
  }
</style>
</head>
<body>

<div id="topbar">👑 KING PHOTOBOOTH</div>

<div class="camera-section">
  <button id="startBtn" onclick="startShoot()">📸 BẮT ĐẦU<br>CHỤP<br>(4 tấm)</button>

  <div id="cameraBox">
    <video id="video" autoplay playsinline></video>
    <img id="framePreview">
    <div id="count"></div>
    <div id="flash"></div>
  </div>
</div>

<div class="controls">
  <div>
    <select id="frameSelect" onchange="changeFrame()">
      <option value="">Không frame</option>
    </select>
    <br><small>🎨 Frame màu</small>
  </div>
  <div>
    📂 Frame PNG <input type="file" accept="image/png" onchange="loadCustomFrame(event)">
  </div>
  <div>
    🧩 Sticker <input type="file" accept="image/png" onchange="addSticker(event)">
  </div>
  <button onclick="deleteSticker()">🗑 XÓA STICKER</button>
  <select id="filter" onchange="updateFilter()">
    <option value="none">Không filter</option>
    <option value="grayscale(1)">Đen trắng</option>
    <option value="sepia(1)">Vintage</option>
    <option value="contrast(150%)">Tương phản</option>
    <option value="brightness(130%)">Sáng hơn</option>
  </select>
  <button onclick="resetAll()">🔄 RESET TẤT CẢ</button>
  <button onclick="enterFullscreen()">🖥️ TOÀN MÀN HÌNH</button>
</div>

<div id="result">
  <canvas id="canvas"></canvas>
</div>

<button onclick="download()">💾 TẢI ẢNH NGAY</button>
<div id="qr"></div>

<div id="themePanel">
  <h3>🎨 CHỈNH GIAO DIỆN</h3>
  Màu tiêu đề: <input type="color" value="#ff3d6e" onchange="changeTitleColor(this.value)"><br><br>
  Màu nút: <input type="color" value="#ff3d6e" onchange="changeButtonColor(this.value)"><br><br>
  Ảnh nền: <input type="file" accept="image/*" onchange="changeBackground(event)"><br><br>
  Font chữ:
  <select onchange="changeFont(this.value)">
    <option value="Poppins">Poppins (mặc định)</option>
    <option value="Orbitron">Orbitron (futuristic)</option>
    <option value="Arial">Arial</option>
    <option value="Verdana">Verdana</option>
  </select>
</div>

<script>
// ── JavaScript giữ nguyên + nhỏ gọn ────────────────────────────────────────
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const countEl = document.getElementById("count");
const flash = document.getElementById("flash");
const framePreview = document.getElementById("framePreview");

let photos = [];
let frameImage = null;
let frameColor = null;
let stickers = [];
let dragging = null;
let selectedSticker = null;

navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
  .then(stream => video.srcObject = stream)
  .catch(err => alert("Không truy cập được camera: " + err.message));

function updateFilter() {
  video.style.filter = document.getElementById("filter").value;
}

let frames = [
  {name:"Frame Trắng", color:"#ffffff"},
  {name:"Frame Hồng", color:"#ffc0cb"},
  {name:"Frame Đen", color:"#000000"},
  {name:"Frame Vàng", color:"#ffe066"},
  {name:"Frame Xanh", color:"#00c2ff"},
  {name:"Frame Tím", color:"#9b59b6"}
];

window.onload = () => {
  let select = document.getElementById("frameSelect");
  frames.forEach((f,i) => {
    let opt = document.createElement("option");
    opt.value = i;
    opt.text = f.name;
    select.appendChild(opt);
  });
};

function changeFrame() {
  let id = document.getElementById("frameSelect").value;
  if (id === "") {
    frameColor = null; frameImage = null; framePreview.src = "";
    return;
  }
  frameColor = frames[id].color;
  frameImage = null;
  framePreview.src = "";
}

function loadCustomFrame(e) {
  let file = e.target.files[0];
  if (!file) return;
  let url = URL.createObjectURL(file);
  framePreview.src = url;
  let img = new Image();
  img.onload = () => { frameImage = img; frameColor = null; };
  img.src = url;
}

function addSticker(e) {
  let file = e.target.files[0];
  if (!file) return;
  let url = URL.createObjectURL(file);
  let img = new Image();
  img.onload = () => {
    stickers.push({ img, x: canvas.width/2 - 60, y: canvas.height/2 - 60, size: 120, angle: 0 });
    drawCanvas();
  };
  img.src = url;
}

function deleteSticker() {
  if (!selectedSticker) return;
  stickers = stickers.filter(s => s !== selectedSticker);
  selectedSticker = null;
  drawCanvas();
}

async function startShoot() {
  photos = [];
  for (let i = 0; i < 4; i++) {
    await countdown();
    takePhoto();
    await sleep(600);
  }
  drawCanvas();
  createQR();
  alert("Chụp xong 4 tấm! Tải ảnh hoặc scan QR nhé 👑");
}

function takePhoto() {
  flash.style.opacity = 1;
  setTimeout(() => flash.style.opacity = 0, 180);
  let temp = document.createElement("canvas");
  temp.width = 480; temp.height = 360;
  let t = temp.getContext("2d");
  t.filter = document.getElementById("filter").value;
  t.drawImage(video, 0, 0, 480, 360);
  photos.push(temp);
}

function drawCanvas() {
  let w = 520, h = photos.length * 380 + 80;
  canvas.width = w; canvas.height = h;
  ctx.fillStyle = frameColor || "white";
  ctx.fillRect(0,0,w,h);

  photos.forEach((p,i) => {
    ctx.drawImage(p, 60, 40 + i*380, 400, 300);
    ctx.strokeStyle = "rgba(0,0,0,0.25)";
    ctx.lineWidth = 2;
    ctx.strokeRect(60, 40 + i*380, 400, 300);
  });

  if (frameImage) ctx.drawImage(frameImage, 0, 0, w, h);

  stickers.forEach(s => {
    ctx.save();
    ctx.translate(s.x + s.size/2, s.y + s.size/2);
    ctx.rotate(s.angle);
    ctx.drawImage(s.img, -s.size/2, -s.size/2, s.size, s.size);
    ctx.restore();
  });
}

// Kéo - thả - xoay - zoom sticker
canvas.addEventListener("mousedown", e => {
  let rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;
  selectedSticker = null;
  stickers.forEach(s => {
    if (x > s.x && x < s.x + s.size && y > s.y && y < s.y + s.size) {
      dragging = s;
      selectedSticker = s;
    }
  });
});

canvas.addEventListener("mousemove", e => {
  if (!dragging) return;
  let rect = canvas.getBoundingClientRect();
  let newX = e.clientX - rect.left - dragging.size / 2;
  let newY = e.clientY - rect.top - dragging.size / 2;
  newX = Math.max(0, Math.min(newX, canvas.width - dragging.size));
  newY = Math.max(0, Math.min(newY, canvas.height - dragging.size));
  dragging.x = newX;
  dragging.y = newY;
  drawCanvas();
});

canvas.addEventListener("mouseup", () => dragging = null);

canvas.addEventListener("contextmenu", e => {
  e.preventDefault();
  if (!selectedSticker) return;
  selectedSticker.angle += Math.PI / 8;
  drawCanvas();
});

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  if (!selectedSticker) return;
  if (e.deltaY < 0) selectedSticker.size += 20;
  else {
    selectedSticker.size -= 20;
    if (selectedSticker.size < 40) selectedSticker.size = 40;
  }
  drawCanvas();
});

function countdown() {
  return new Promise(resolve => {
    let t = 3;
    countEl.innerText = t;
    let timer = setInterval(() => {
      t--;
      if (t <= 0) {
        clearInterval(timer);
        countEl.innerText = "📸";
        setTimeout(() => { countEl.innerText = ""; resolve(); }, 500);
      } else countEl.innerText = t;
    }, 1000);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function download() {
  let link = document.createElement("a");
  link.download = "king-photobooth-" + Date.now() + ".png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

function createQR() {
  document.getElementById("qr").innerHTML = "";
  new QRCode(document.getElementById("qr"), {
    text: canvas.toDataURL(),
    width: 220,
    height: 220,
    colorDark: "#000000",
    colorLight: "#ffffff"
  });
}

function enterFullscreen() {
  if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
}

function resetAll() {
  photos = [];
  stickers = [];
  selectedSticker = dragging = null;
  frameImage = frameColor = null;
  framePreview.src = "";
  document.getElementById("frameSelect").value = "";
  canvas.width = canvas.height = 1;
  document.getElementById("qr").innerHTML = "";
  alert("Đã reset toàn bộ! Sẵn sàng chụp mới 👑");
}

// Theme functions
function changeTitleColor(c) { document.getElementById("topbar").style.color = c; }
function changeButtonColor(c) {
  document.querySelectorAll("button:not(#startBtn)").forEach(b => {
    b.style.background = `linear-gradient(45deg, ${c}, #ff8c42)`;
  });
  document.getElementById("startBtn").style.background = `linear-gradient(135deg, ${c}, #ff8c42)`;
}
function changeBackground(e) {
  let file = e.target.files[0];
  if (!file) return;
  let url = URL.createObjectURL(file);
  document.body.style.backgroundImage = `url(${url})`;
  document.body.style.backgroundSize = "cover";
  document.body.style.backgroundPosition = "center";
}
function changeFont(f) {
  document.body.style.fontFamily = f + ", sans-serif";
  if (f === "Orbitron") {
    document.getElementById("topbar").style.fontFamily = "'Orbitron', sans-serif";
  }
}
</script>
</body>
</html>
