<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>👑 KING PHOTOBOOTH</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
color:white;
text-align:center;
}

#topbar{
background:#111;
padding:15px;
font-size:32px;
font-weight:bold;
}

#cameraBox{
position:relative;
display:inline-block;
margin-top:20px;
}

video{
width:520px;
border-radius:15px;
border:6px solid white;
}

#count{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
font-weight:bold;
color:#00ffd5;
}

#flash{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
transition:0.2s;
}

button{
padding:14px 28px;
font-size:20px;
border:none;
border-radius:12px;
margin:5px;
cursor:pointer;
background:#ff3d6e;
color:white;
}

canvas{
background:white;
margin-top:20px;
}

</style>

</head>

<body>

<div id="topbar">👑 KING PHOTOBOOTH</div>

<div id="cameraBox">

<video id="video" autoplay playsinline></video>

<div id="count"></div>

<div id="flash"></div>

</div>

<br>

<button onclick="startShoot()">📸 CHỤP ẢNH</button>

<button onclick="printPhoto()">🖨 IN ẢNH</button>

<button onclick="enterFullscreen()">🖥 KIOSK</button>

<br>

<canvas id="canvas"></canvas>

<div id="qr"></div>


<!-- ÂM THANH ONLINE -->

<audio id="snapSound">
<source src="https://www.soundjay.com/mechanical/camera-shutter-click-01.mp3">
</audio>

<audio id="beepSound">
<source src="https://www.soundjay.com/buttons/beep-07.mp3">
</audio>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const count=document.getElementById("count")
const flash=document.getElementById("flash")

let photos=[]

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>video.srcObject=stream)

/* CHỤP 4 ẢNH */

async function startShoot(){

photos=[]

for(let i=0;i<4;i++){

await countdown()

takePhoto()

await sleep(500)

}

makeStrip()

createQR()

}

/* ĐẾM NGƯỢC */

function countdown(){

return new Promise(resolve=>{

let t=3

count.innerText=t

let timer=setInterval(()=>{

let beep=document.getElementById("beepSound")

beep.currentTime=0
beep.play()

t--

if(t<=0){

clearInterval(timer)

count.innerText="📸"

setTimeout(()=>{

count.innerText=""
resolve()

},400)

}else{

count.innerText=t

}

},1000)

})

}

/* CHỤP ẢNH */

function takePhoto(){

let snap=document.getElementById("snapSound")

snap.currentTime=0
snap.play()

flash.style.opacity=1
setTimeout(()=>flash.style.opacity=0,200)

let temp=document.createElement("canvas")

temp.width=400
temp.height=300

let t=temp.getContext("2d")

t.drawImage(video,0,0,400,300)

photos.push(temp)

}

/* GHÉP ẢNH */

function makeStrip(){

let w=420
let h=photos.length*310+40

canvas.width=w
canvas.height=h

ctx.fillStyle="white"
ctx.fillRect(0,0,w,h)

for(let i=0;i<photos.length;i++){

ctx.drawImage(photos[i],10,10+i*310,400,300)

}

}

/* QR */

function createQR(){

document.getElementById("qr").innerHTML=""

new QRCode(document.getElementById("qr"),{

text:canvas.toDataURL("image/png"),
width:200,
height:200

})

}

/* IN ẢNH */

function printPhoto(){

let data=canvas.toDataURL()

let w=window.open("")

w.document.write("<img src='"+data+"' style='width:100%'>")

w.print()

}

/* FULLSCREEN */

function enterFullscreen(){

document.documentElement.requestFullscreen()

}

function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

</script>

</body>
</html>
