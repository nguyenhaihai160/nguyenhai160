<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>KING PHOTOBOOTH - PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; text-align: center; background: #1a1a1a; color: white; }
        #topbar { background: #000; padding: 20px; font-size: 28px; font-weight: bold; }
        #cameraBox { position: relative; display: inline-block; margin: 20px; border: 6px solid #fff; border-radius: 15px; overflow: hidden; line-height: 0; }
        video { width: 640px; height: 480px; object-fit: cover; }
        #framePreview { position: absolute; top: 0; left: 0; width: 640px; height: 480px; pointer-events: none; }
        #count { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 150px; color: #ff3d6e; font-weight: bold; text-shadow: 2px 2px 10px #000; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; transition: 0.1s; }
        .controls { margin-bottom: 20px; }
        button { padding: 15px 30px; font-size: 18px; margin: 5px; cursor: pointer; border: none; border-radius: 8px; background: #ff3d6e; color: white; transition: 0.3s; }
        button:disabled { background: #555; cursor: not-allowed; }
        #result { margin: 20px; padding: 20px; background: #333; border-radius: 10px; display: inline-block; }
        canvas { max-width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

<div id="topbar">👑 KING PHOTOBOOTH</div>

<div id="cameraBox">
    <video id="video" autoplay playsinline></video>
    <img id="framePreview">
    <div id="count"></div>
    <div id="flash"></div>
</div>

<div class="controls">
    <select id="frameSelect" onchange="changeFrame()">
        <option value="">Không Frame</option>
        <option value="frame1.png">Frame 1</option>
    </select>
    <select id="filter" onchange="updateFilter()">
        <option value="none">Gốc</option>
        <option value="grayscale(1)">Đen trắng</option>
        <option value="sepia(1)">Cổ điển</option>
    </select>
    <button id="shootBtn" onclick="startShoot()">📸 BẮT ĐẦU CHỤP</button>
</div>

<div id="result">
    <canvas id="canvas"></canvas>
    <div id="qr" style="margin-top: 15px;"></div>
    <br>
    <button onclick="download()">💾 TẢI ẢNH</button>
</div>

<script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const count = document.getElementById("count");
    const flash = document.getElementById("flash");
    const framePreview = document.getElementById("framePreview");
    let photos = [];
    let frameImage = null;

    // Khởi tạo Camera
    navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } })
        .then(stream => { video.srcObject = stream; })
        .catch(e => alert("Vui lòng cấp quyền Camera!"));

    function updateFilter() { video.style.filter = document.getElementById("filter").value; }

    function changeFrame() {
        let path = document.getElementById("frameSelect").value;
        if (!path) { framePreview.src = ""; frameImage = null; return; }
        framePreview.src = path;
        frameImage = new Image();
        frameImage.src = path;
    }

    async function startShoot() {
        document.getElementById("shootBtn").disabled = true;
        photos = [];
        for (let i = 0; i < 4; i++) {
            await new Promise(r => {
                let t = 3;
                count.innerText = t;
                let interval = setInterval(() => {
                    t--;
                    if (t <= 0) {
                        clearInterval(interval);
                        count.innerText = "📸";
                        flash.style.opacity = 1;
                        setTimeout(() => { flash.style.opacity = 0; count.innerText = ""; r(); }, 200);
                    } else { count.innerText = t; }
                }, 1000);
            });
            takePhoto();
        }
        makeStrip();
        document.getElementById("shootBtn").disabled = false;
    }

    function takePhoto() {
        let temp = document.createElement("canvas");
        temp.width = 640; temp.height = 480;
        let t = temp.getContext("2d");
        t.filter = document.getElementById("filter").value;
        t.drawImage(video, 0, 0, 640, 480);
        photos.push(temp);
    }

    function makeStrip() {
        canvas.width = 400; canvas.height = 1400;
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, 400, 1400);
        photos.forEach((p, i) => ctx.drawImage(p, 25, 50 + (i * 320), 350, 260));
        if (frameImage) ctx.drawImage(frameImage, 0, 0, 400, 1400);
        document.getElementById("qr").innerHTML = "";
        new QRCode(document.getElementById("qr"), canvas.toDataURL());
    }

    function download() {
        let link = document.createElement("a");
        link.download = "photobooth.png";
        link.href = canvas.toDataURL();
        link.click();
    }
</script>
</body>
</html>
